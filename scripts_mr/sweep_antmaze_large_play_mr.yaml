project: MR-training
program: run_mr_training.py
method: bayes
metric:
  name: eval_acc_best
  goal: maximize
parameters:
  config_path:
    value: "scripts_mr/antmaze_large_play_mr.yaml"
  width:
    distribution: int_uniform
    min: 6   # 2^6 = 64
    max: 9   # 2^9 = 512
  depth:
    distribution: int_uniform
    min: 1
    max: 6
  lr:
    distribution: log_uniform_values
    min: 1e-5
    max: 1e-2
  epochs:
    value: 5000
