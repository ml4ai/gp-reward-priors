project: MR-training
program: run_mr_training.py
method: grid
parameters:
  # specify all configs to run for the choosen algorithm
  config_path:
    value: "scripts_mr/antmaze_medium_diverse_mr.yaml"
  width:
      values: [64, 128, 256]
  depth:
      values: [2, 3, 4]
  epochs:
    value: 5000
  lr:
    values: [0.03, 0.003, 0.0003, 0.00003, 0.000003]