project: BB-training
program: run_bnn_training.py
method: grid
parameters:
  # specify all configs to run for the choosen algorithm
  config_path:
    value: "scripts_bnn/bb_bnn.yaml"
  dataset: 
    value: "data/bb/t0012_pref.hdf5"
  # width is a log2 exponent: actual width = 2**width (8→256 ... 11→2048)
  width:
    values: [8, 9, 10, 11]
  depth:
    values: [5, 6, 7, 8]
  gp_cov_scale:
    values: [1.0, 10.0, 1000.0]
  n_meas:
    values: [64, 32, 16, 8, 0]
  early_stop_acc_threshold:
    value: 0.98
