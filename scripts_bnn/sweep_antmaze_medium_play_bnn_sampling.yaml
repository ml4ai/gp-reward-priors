project: BNN-training
program: run_bnn_training.py
method: bayes
run_cap: 50
metric:
  name: test_mean_accuracy
  goal: maximize

# Stage 2 of 3:  warmup -> sampling -> sampling_best.
# Runs the FULL parallel-chain cyclical-SGHMC phase and tunes ONLY the sampler
# schedule (sghmc_lr=lr_min, sghmc_lr_max, cycle_length, mdecay) on the
# posterior-predictive test_mean_accuracy.  Uses the SAME held-out split as the
# warmup sweep (training_split is inherited from the base config = 0.8, so
# eval_label is "test" and the metric is test_mean_accuracy).  Architecture and
# prior strength are FIXED to the sweep_antmaze_medium_play_bnn_warmup.yaml winners.
# Motivation: a config can reach warmup_final_acc ~0.97 yet collapse to ~0.52
# posterior accuracy when the cyclical schedule is too hot (the chains diverge
# from the data-fitting basin), so the schedule must be tuned on the real
# posterior metric, not on warm-up accuracy.
parameters:
  config_path:
    value: "scripts_bnn/antmaze_medium_play_bnn.yaml"

  num_samples:
    value: 35
  n_discarded:
    value: 2
    
  # Cyclical schedule must be on for sghmc_lr_max / cycle_length to take effect.
  use_cyclical_lr:
    value: true

  # Let chain sampling actually run: a high threshold early-stops before any
  # samples are collected and test_mean_accuracy is never logged.  Set from the
  # *_warmup sweep results — low enough that the winning architecture clears it
  # (e.g. a little below the warmup winner's accuracy).
  early_stop_acc_threshold:
    value: 0.8

  # ---- Fixed from sweep_antmaze_medium_play_bnn_warmup.yaml winners ----
  num_burn_in_steps:
    value: 5000
  warmup_log_every:
    value: 250
  width:
    value: 8
  depth:
    value: 6
  n_meas:
    value: 10

  # ---- Swept: cyclical-SGHMC sampler schedule ----
  # Cool-phase / minimum step size (lr_min).  Capped at 3e-3 so lr_max >= lr_min.
  sghmc_lr:
    distribution: log_uniform_values
    min: 1e-4
    max: 3e-3
  # Hot-phase peak step size (lr_max).  Floor 3e-3 meets sghmc_lr's ceiling so
  # lr_max >= lr_min by construction.  Sweep low enough to find a peak that
  # explores without ejecting weights from the data-fitting basin.
  sghmc_lr_max:
    distribution: log_uniform_values
    min: 3e-3
    max: 3e-2
  # Steps per hot+cool cycle.  Longer cycles give the cool phase more time to
  # re-settle before sampling.  Cost scales linearly: steps/chain =
  # (num_samples + n_discarded) * cycle_length.
  cycle_length:
    distribution: q_uniform
    min: 500
    max: 3000
    q: 250
  # Friction: higher mdecay damps hot-phase excursions and shortens the momentum
  # decorrelation length (~1/mdecay steps).
  mdecay:
    distribution: log_uniform_values
    min: 1e-3
    max: 1e-1
