project: BB-training
group: BB
name: bb

# --- Sampling budget ---
num_chains: 4
num_samples: 50          # samples per chain; one per cycle with cyclical lr
n_discarded: 5           # discard first N cycles as extra post-burn-in warm-up
num_burn_in_steps: 3000  # steps for preconditioner adaptation (shared warm-up
                         # + per-chain burn-in each run this many steps)

# --- SGHMC core hyperparameters ---
sghmc_lr: 0.003          # cool-phase (sampling) step size; tuned empirically
mdecay: 0.01             # low friction → long momentum → better barrier crossing
                         # in hot phase; 1/mdecay ≈ 100-step decorrelation length
batch_size: 256
n_meas: 256
meas_jitter: .000001
gp_cov_scale: 1.0

# --- Cyclical step-size schedule (Zhang et al. 2020) ---
# Hot phase (lr_max → sghmc_lr, cosine): momentum zeroed at onset so the
# chain escapes the current basin.  Cool phase (near sghmc_lr): one sample
# collected at the final step.  The adaptive preconditioner is frozen after
# burn-in, so only lr cycles.
use_cyclical_lr: true
sghmc_lr_max: 0.03       # hot-phase peak lr (~10× sghmc_lr)
cycle_length: 1000       # total steps per cycle (hot + cool)
fraction_cool: 0.25      # 250 cool steps / 750 hot steps per cycle

# keep_every is used only when use_cyclical_lr: false
keep_every: 1000

# --- Data ---
dataset: data/bb/t0012_pref.hdf5
dataset_id: bb_t0012
training_split: 0.8
measurement_dataset: data/bb/bbway_tuning_set.hdf5

# --- Misc ---
print_every_n_samples: 10
seed: 0
OUT_DIR: ./exp/reward_learning/bb_optim_f
