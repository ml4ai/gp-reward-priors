project: BNN-training
program: run_bnn_training.py
method: grid
metric:
  name: warmup_final_acc
  goal: maximize

# Multi-seed re-evaluation of the best config from
# sweep_antmaze_medium_play_bnn.yaml.  Replace every PLACEHOLDER with the
# winning value from the Bayesian optimization sweep, then run: grid expands
# to one run per seed (10 total) so you get mean +/- std for the chosen config.
parameters:
  config_path:
    value: "scripts_bnn/antmaze_medium_play_bnn.yaml"

  # Train on the FULL dataset (no held-out split) for the final multi-seed eval
  training_split:
    value: 1.0

  # Fixed sweep settings (copy from the bayes sweep, or adjust for the re-eval)
  early_stop_acc_threshold:
    value: 0.0
  num_burn_in_steps:
    value: 5000
  warmup_log_every:
    value: 250

  # Best hyperparameters from the bayes sweep
  gp_cov_scale:
    value: 24.134764576305223
  n_meas:
    value: 15
  width:
    value: 9
  depth:
    value: 3
  sghmc_lr:
    value: 0.0005823471121717912
  mdecay:
    value: 0.007862499246631656

  # Multi-seed grid
  seed:
    value: 0
