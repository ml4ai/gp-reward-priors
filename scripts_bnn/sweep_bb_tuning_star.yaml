project: BB-tuning-star
program: bb_tuning_star.py
method: grid
parameters:
  # specify all configs to run for the choosen algorithm
  config_path:
    value: "scripts_bnn/bb_tuning_star.yaml"
  width:
    values: [1024, 2048]
  depth:
    values: [6, 7, 8]
  n_data: 
    value: 256
  batches:
    value: 100
  lr:
    value: 0.3
