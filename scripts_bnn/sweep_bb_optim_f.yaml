project: BB-training
program: run_bnn_training_f.py
method: grid
parameters:
  # specify all configs to run for the choosen algorithm
  config_path:
    value: "scripts_bnn/bb_optim_f.yaml"
  dataset: 
    value: "data/bb/t0012_pref.hdf5"
  width:
    values: [256, 512, 1024, 2048]
  depth:
    values: [5, 6, 7, 8]
  gp_cov_scale:
    values: [1.0, 10.0, 1000.0]
  n_meas:
    values: [0, 8, 16, 32, 64]
