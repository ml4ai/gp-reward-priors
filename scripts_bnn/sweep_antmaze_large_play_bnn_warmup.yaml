project: BNN-training
program: run_bnn_training.py
method: bayes
run_cap: 70
metric:
  name: warmup_final_acc
  goal: maximize

# Stage 1 of 3:  warmup -> sampling -> sampling_best.
# Cheaply tunes architecture + functional-prior strength + warm-up sampler knobs
# on warmup_final_acc, evaluated right after burn-in BEFORE the expensive
# parallel-chain phase.  The map-informed GP prior's design hyperparameters
# (map_eta, map_sig_c2, map_sig_g2, map_sig_n2) are deliberately NOT swept: they
# are prior-design choices fixed from the maze geometry and the prior-sample
# diagnostics, never selected on downstream return (tuning them on reward would
# smuggle the hidden goal back in).  They are inherited from the base config.
# Only n_meas (incl. 0 = prior off) is searched, to learn whether and how much
# the map-informed prior helps.
parameters:
  config_path:
    value: "scripts_bnn/antmaze_large_play_bnn.yaml"

  # ---- Fixed overrides ----
  # warmup_final_acc is logged BEFORE chain sampling, so force every run to stop
  # right after warm-up (accuracy is always < 1.01): this skips the parallel-
  # chain phase entirely — same metric, far cheaper sweep runs.
  early_stop_acc_threshold:
    value: 1.01
  # The metric is warm-up accuracy; give every run enough burn-in to converge so
  # configs are compared fairly.  These preference sets are small, so a few
  # thousand steps is many epochs.
  num_burn_in_steps:
    value: 5000
  warmup_log_every:
    value: 250

  # ---- Swept: architecture + prior strength + warm-up sampler ----
  # width is a log2 exponent: actual width = 2**width (6 -> 64 ... 10 -> 1024).
  width:
    distribution: int_uniform
    min: 6
    max: 10
  depth:
    distribution: int_uniform
    min: 2
    max: 6
  # n_meas: functional-prior measurement points per step.  0 = prior off, so the
  # optimizer can learn directly whether the map-informed prior helps at all.
  n_meas:
    distribution: int_uniform
    min: 0
    max: 64
  sghmc_lr:
    distribution: log_uniform_values
    min: 1e-4
    max: 1e-2
  mdecay:
    distribution: log_uniform_values
    min: 1e-3
    max: 1e-1
