project: PT-training
program: run_pt_training.py
method: bayes
run_cap: 50
metric:
  name: eval_acc_best
  goal: maximize
parameters:
  config_path:
    value: "scripts_pt/antmaze_medium_diverse_pt.yaml"
  embd_dim:
    distribution: int_uniform
    min: 6   # 2^6 = 64
    max: 8   # 2^8 = 256
  head_dim:
    distribution: int_uniform
    min: 5   # 2^5 = 32
    max: 7   # 2^7 = 128
  num_layers:
    distribution: int_uniform
    min: 1
    max: 4
  lr:
    distribution: log_uniform_values
    min: 1e-5
    max: 1e-2
  epochs:
    value: 5000
